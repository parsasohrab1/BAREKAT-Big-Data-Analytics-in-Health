# BAREKAT Production — no dev bind mounts, persistent volumes, restart policies

services:
  postgres:
    image: postgres:16-alpine
    container_name: barekat-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-barekat_health}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-barekat_health}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: barekat-prod-redis
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: barekat-prod-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_prod_data:/data
    restart: unless-stopped

  api:
    container_name: barekat-prod-api
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      BAREKAT_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-barekat_health}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_DEV_FALLBACK: "false"
      DB_AUTO_MIGRATE: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dashboard.barekat.local}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    container_name: barekat-prod-dashboard
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    environment:
      BAREKAT_ENV: production
      BAREKAT_API_URL: http://api:8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-barekat_health}
      DASHBOARD_DATA_SOURCE: postgres
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    container_name: barekat-prod-celery-worker
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    environment:
      BAREKAT_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-barekat_health}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATA_RAW_PATH: /app/data/raw
    volumes:
      - prod_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    container_name: barekat-prod-celery-beat
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    command: ["celery", "-A", "barekat.worker.celery_app:celery_app", "beat", "--loglevel=info"]
    environment:
      BAREKAT_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-barekat_health}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATA_RAW_PATH: /app/data/raw
      AUTH_DEV_FALLBACK: "false"
      DB_AUTO_MIGRATE: "true"
    volumes:
      - prod_data:/app/data:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: barekat-prod-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: barekat-prod-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  faust-worker:
    container_name: barekat-prod-faust-worker
    build:
      context: .
      dockerfile: docker/stream/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BAREKAT_ENV: production
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-barekat_health}
      AUTH_DEV_FALLBACK: "false"
    restart: unless-stopped

  spark-master:
    image: bitnami/spark:3.5
    container_name: barekat-prod-spark-master
    profiles: ["spark"]
    environment:
      - SPARK_MODE=master
    restart: unless-stopped

  spark-worker:
    image: bitnami/spark:3.5
    container_name: barekat-prod-spark-worker
    profiles: ["spark"]
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    restart: unless-stopped

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  prod_data:

networks:
  default:
    name: barekat-prod-net
