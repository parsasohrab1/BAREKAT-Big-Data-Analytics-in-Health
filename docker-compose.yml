services:
  postgres:
    image: postgres:16-alpine
    container_name: barekat-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barekat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barekat_secret}
      POSTGRES_DB: ${POSTGRES_DB:-barekat_health}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-barekat} -d ${POSTGRES_DB:-barekat_health}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barekat-net

  minio:
    image: minio/minio:latest
    container_name: barekat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-barekat_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-barekat_minio_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barekat-net

  redis:
    image: redis:7-alpine
    container_name: barekat-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barekat-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: barekat-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - barekat-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: barekat-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - barekat-net

  spark-master:
    image: bitnami/spark:3.5
    container_name: barekat-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "${SPARK_MASTER_PORT:-8080}:8080"
      - "${SPARK_MASTER_UI_PORT:-7077}:7077"
    networks:
      - barekat-net

  spark-worker:
    image: bitnami/spark:3.5
    container_name: barekat-spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    networks:
      - barekat-net

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: barekat-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - BAREKAT_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-barekat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-barekat_secret}
      - POSTGRES_DB=${POSTGRES_DB:-barekat_health}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-barekat_minio}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-barekat_minio_secret}
      - MINIO_BUCKET_LAKE=${MINIO_BUCKET_LAKE:-health-lake}
      - LAKE_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    networks:
      - barekat-net

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: barekat-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BAREKAT_API_URL=http://api:8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-barekat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-barekat_secret}
      - POSTGRES_DB=${POSTGRES_DB:-barekat_health}
      - DASHBOARD_DATA_SOURCE=postgres
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    volumes:
      - ./dashboards:/app/dashboards:ro
      - ./src:/app/src:ro
      - ./data:/app/data:ro
    networks:
      - barekat-net

  celery-worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: barekat-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-barekat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-barekat_secret}
      - POSTGRES_DB=${POSTGRES_DB:-barekat_health}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_RAW_PATH=/app/data/raw
      - ETL_MAX_RETRIES=${ETL_MAX_RETRIES:-3}
      - ETL_RETRY_DELAY_SECONDS=${ETL_RETRY_DELAY_SECONDS:-60}
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    networks:
      - barekat-net

  celery-beat:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: barekat-celery-beat
    command: ["celery", "-A", "barekat.worker.celery_app:celery_app", "beat", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-barekat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-barekat_secret}
      - POSTGRES_DB=${POSTGRES_DB:-barekat_health}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_RAW_PATH=/app/data/raw
      - ETL_INCREMENTAL_MINUTE=${ETL_INCREMENTAL_MINUTE:-0}
      - ETL_FULL_HOUR=${ETL_FULL_HOUR:-2}
      - ETL_FULL_MINUTE=${ETL_FULL_MINUTE:-0}
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data:ro
    networks:
      - barekat-net

  faust-worker:
    build:
      context: .
      dockerfile: docker/stream/Dockerfile
    container_name: barekat-faust-worker
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-barekat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-barekat_secret}
      - POSTGRES_DB=${POSTGRES_DB:-barekat_health}
    networks:
      - barekat-net

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  barekat-net:
    driver: bridge
